<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Easy homemade recipes for every occasion.">
  <meta name="author" content="Austin Martineau">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Book</title>
  <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="recipes.css">

  <!-- Open Graph (Facebook, LinkedIn, etc.) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Your Title">
  <meta property="og:description" content="Your Description">
  <meta property="og:url" content="Your URL">
  <meta property="og:image" content="social-preview-image.png">

  <!-- X Card -->
  <meta name="twitter:card" content="Social Preview Image">
  <meta name="twitter:title" content="Your Title">
  <meta name="twitter:description" content="Your Description">
  <meta name="twitter:image" content="social-preview-image.png">

  <!-- One favicon (ICO works everywhere) -->
  <link rel="icon" href="/favicon.ico">

  <!-- One Apple Touch Icon (iOS home screen) -->
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

</head>

<body>
  <header>
    <section class="logo-title">
      <img src="images/recipe-book.png" alt="Recipe Book logo">
      <h1>Recipe Book</h1>
    </section>
  </header>

  <main>
    <form class="search-area">
      <label for="search" class="hidden">Search recipes</label>
      <input type="search" id="search" name="search" placeholder="Find a recipe">
      <button type="submit">
        <img src="images/search.svg" alt="Search">
      </button>
    </form>

    <hr>

    <section class="recipe-card">
      <div class="recipe-image">
        <img src="images/apple-crisp.jpg" alt="Apple crisp dessert">
      </div>

      <div class="recipe-content">
        <p class="tag">dessert</p>
        <h2>Apple Crisp</h2>

        <span
          class="rating"
          role="img"
          aria-label="Rating: 4 out of 5 stars"
        >
          <span aria-hidden="true" class="icon-star">⭐</span>
          <span aria-hidden="true" class="icon-star">⭐</span>
          <span aria-hidden="true" class="icon-star">⭐</span>
          <span aria-hidden="true" class="icon-star">⭐</span>
          <span aria-hidden="true" class="icon-star-empty">☆</span>
        </span>

        <p class="description">
          This apple crisp recipe is a simple yet delicious fall dessert that's great served warm with vanilla ice cream.
        </p>
      </div>
    </section>
  </main>

  <footer>
    <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">
      Recipe icons created by Freepik - Flaticon
    </a>

    <div class="social">
      <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates -->
      <a href="#"><img src="images/instagram_icon.svg" alt="Instagram icon"></a>
      <a href="#"><img src="images/youtube_icon.svg" alt="YouTube icon"></a>
      <a href="#"><img src="images/pinterest_icon.svg" alt="Pinterest icon"></a>
    </div>
  </footer>
</body>
</html>
